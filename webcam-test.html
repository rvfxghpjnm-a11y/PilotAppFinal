<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PilotApp Webcam Test</title>
  <style>
    body {
      margin: 0;
      background: #0b0f17;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 14px 16px;
      border-bottom: 1px solid #1f2937;
      background: #111827;
    }
    h1 {
      margin: 0;
      font-size: 22px;
    }
    .wrap {
      padding: 14px;
    }
    .box {
      border: 1px solid #374151;
      border-radius: 12px;
      overflow: hidden;
      background: #111827;
    }
    iframe {
      display: block;
      width: 100%;
      height: 75vh;
      border: 0;
      background: #000;
    }
    .hint {
      margin-top: 12px;
      opacity: .75;
      font-size: 14px;
    }
    a {
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <header>
    <h1>PilotApp Webcam Test</h1>
  </header>

  <div class="wrap">
    <div class="box">
      <iframe
        src="https://www.kiel-canal.de/webcam/"
        allowfullscreen
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>

    <div class="hint">
      Wenn die Fläche leer bleibt oder eine Blockiermeldung erscheint, erlaubt die Quelle kein Einbetten.
      Dann bleibt nur ein externer Link oder eine andere technische Lösung.
    </div>
  </div>
</body>
</html>
