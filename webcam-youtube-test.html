<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PilotApp Webcam YouTube Test</title>
  <style>
    body {
      margin: 0;
      background: #0b0f17;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 14px 16px;
      border-bottom: 1px solid #1f2937;
      background: #111827;
    }
    h1 {
      margin: 0;
      font-size: 22px;
    }
    .wrap {
      padding: 14px;
      display: grid;
      gap: 18px;
    }
    .card {
      border: 1px solid #374151;
      border-radius: 12px;
      overflow: hidden;
      background: #111827;
    }
    .card-title {
      padding: 10px 12px;
      font-weight: 700;
      border-bottom: 1px solid #374151;
    }
    .video {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>PilotApp Webcam YouTube Test</h1>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="card-title">Kiel-Holtenau</div>
      <div class="video">
        <iframe
          src="https://www.youtube-nocookie.com/embed/ll6Yep9Va5o?autoplay=1&mute=1&playsinline=1"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Brunsbüttel</div>
      <div class="video">
        <iframe
          src="https://www.youtube-nocookie.com/embed/Q0HnrUeceac?autoplay=1&mute=1&playsinline=1"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </div>
</body>
</html>
