<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>PilotAppFinal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Lokale Assets mit Cache-Buster -->
  <script>
    (function () {
      const v = String(Date.now());
      window.__APP_VERSION__ = v;

      document.write(`
        <link rel="stylesheet" href="css/style.css?v=${v}">
        <script type="importmap">
        {
          "imports": {
            "./graph.js": "./js/graph.js?v=${v}",
            "./utils.js": "./js/utils.js?v=${v}",
            "./views/dashboard.js": "./js/views/dashboard.js?v=${v}",
            "./views/boert.js": "./js/views/boert.js?v=${v}",
            "./views/seelotse.js": "./js/views/seelotse.js?v=${v}",
            "./views/ruesterbergen.js": "./js/views/ruesterbergen.js?v=${v}"
          }
        }
        <\/script>
      `);
    })();
  </script>

  <!-- Chart.js mit Fallback -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    if (!window.Chart) {
      document.write('<script src="https://unpkg.com/chart.js@4.4.1/dist/chart.umd.min.js"><\/script>');
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>

<header>
  <h1>PilotAppFinal</h1>

  <div class="row" id="persons">
    Lade Personen …
  </div>

  <div class="row">
    <button data-view="dashboard" class="active">Dashboard</button>
    <button data-view="short">Short</button>
    <button data-view="long">Long</button>
    <button data-view="graph">Graph</button>
    <button data-view="seelotse">Seelotse</button>
    <button data-view="ruesterbergen">Rüsterbergen</button>
    <button data-view="boert">Bört</button>
  </div>

  <div class="row" id="timeControls" style="display:none">
    <button data-hours="3">3h</button>
    <button data-hours="6">6h</button>
    <button data-hours="12">12h</button>
    <button data-hours="24" class="active">24h</button>
  </div>

  <div class="row" id="boertRange" style="display:none; gap:12px;">
    <label>
      Von:
      <input type="datetime-local" id="boertFrom">
    </label>

    <label>
      Bis:
      <input type="datetime-local" id="boertTo">
    </label>

    <button id="boertApply">Suchen</button>
    <button id="boertReset">Reset</button>
  </div>

  <div class="row" id="refreshControls">
    <button id="refreshNow">↻</button>
    <div id="status">–</div>
  </div>
</header>

<main id="content"></main>

<script>
  (function () {
    const v = window.__APP_VERSION__ || String(Date.now());
    document.write(`<script type="module" src="js/app.js?v=${v}"><\/script>`);
  })();
</script>

</body>
</html>
